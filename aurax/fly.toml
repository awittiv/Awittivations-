app = "aurax"
primary_region = "iad"

[build]

[env]
  # DB lives on the persistent volume so data/history survive deploys.
  SQLITE_PATH = "/data/aurax.db"

[mounts]
  source = "aurax_data"
  destination = "/data"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8080
min_machines_running = 1
processes = ["app"]

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"

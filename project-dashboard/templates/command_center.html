const state={done:new Set(['t1','t3','t6','t10','t11','t13'])};

async function loadState(){
  try{
    const r=await window.storage.list('task_');
    if(r&&r.keys){for(const k of r.keys){const v=await window.storage.get(k);if(v&&v.value==='1')state.done.add(k.replace('task_',''));}}
  }catch(e){}
}

async function toggleTask(id){
  if(state.done.has(id)){state.done.delete(id);try{await window.storage.delete('task_'+id);}catch(e){}}
  else{state.done.add(id);try{await window.storage.set('task_'+id,'1');}catch(e){}}

}

    <div class="stat"><div class="stat-v" style="color:var(--r)">${urgent}</div><div class="stat-l">Urgent</div></div>

}

            </div>
          </div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

  el.innerHTML=`
  <div class="fin-box">
    <div class="fin-title">Financial Snapshot</div>
    <div class="fin-row"><span class="fin-label">2026 Revenue Target</span><span class="fin-val" style="color:var(--am)">$412,500</span></div>
    <div class="fin-row"><span class="fin-label">NSF SBIR Phase I Ask</span><span class="fin-val" style="color:var(--gold)">$314,362</span></div>
    <div class="fin-row"><span class="fin-label">2026 Pro Forma EBITDA</span><span class="fin-val" style="color:var(--g)">$56,500</span></div>
    <div class="fin-row"><span class="fin-label">2027 Pro Forma EBITDA</span><span class="fin-val" style="color:var(--g)">$151,000</span></div>
    <div class="fin-row"><span class="fin-label">DSCR (SBA requirement)</span><span class="fin-val" style="color:var(--g)">>2.5x ✓</span></div>
  </div>
  ${PROJECTS.map(p=>`
    <div class="proj">
      <div class="proj-hdr">
        <div class="proj-name">${p.name}</div>
        <div class="pstatus ${p.status==='active'?'ps-a':'ps-p'}">${p.status==='active'?'ACTIVE':'PENDING'}</div>
      </div>
      <div class="proj-desc">${p.desc}</div>
      <div class="ptags">${p.tags.map(t=>`<span class="ptag">${t}</span>`).join('')}</div>
      <div class="prog-lbl"><span>${p.milestone}</span><span>${p.prog}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${p.prog}%;background:${p.status==='active'?'var(--gold)':'var(--b2)'}"></div></div>
    </div>`).join('')}`;
}

function renderDocs(){
  const stLabel={r:'READY',p:'IN PROGRESS',m:'MISSING',t:'TEMPLATE'};
  const stCls={r:'ds-r',p:'ds-p',m:'ds-m',t:'ds-t'};
  const groups=[
    {label:'SBA 7(a) Package',docs:DOCS.filter(d=>d.type==='SBA 7(a)')},
    {label:'Compliance',docs:DOCS.filter(d=>d.type==='Compliance')},
    {label:'CashPilot / Strategy',docs:DOCS.filter(d=>d.type==='CashPilot'||d.type==='Strategy')},
    {label:'Corporate',docs:DOCS.filter(d=>d.type==='Corporate')},
  ];
  document.getElementById('docs').innerHTML=groups.map(g=>`
    <div class="sec">
      <div class="sec-hdr"><span class="sec-title">${g.label}</span><span class="sec-cnt">${g.docs.filter(d=>d.st==='r').length}/${g.docs.length} ready</span></div>
      ${g.docs.map(d=>`
        <div class="doc">
          <div class="doc-left">
            <div class="doc-name">${d.name}</div>
            <div class="doc-type">${d.type}</div>
          </div>
          <div class="dstat ${stCls[d.st]}">${stLabel[d.st]}</div>
        </div>`).join('')}
    </div>`).join('');
}

function renderBuild(){
  const el=document.getElementById('build');
  el.innerHTML=`
    <div class="sec">
      <div class="sec-hdr"><span class="sec-title">Milestones</span></div>
      ${MILESTONES.map(m=>{
        const dc={done:'msd',urgent:'msur',upcoming:'msu',future:'msf'}[m.s];
        return`<div class="ms"><div class="ms-dot ${dc}"></div><div class="ms-right"><div class="ms-date">${m.date}</div><div class="ms-title">${m.title}</div><div class="ms-desc">${m.desc}</div></div></div>`;
      }).join('')}
    </div>
    <div class="sec">
      <div class="sec-hdr"><span class="sec-title">Build Notes</span><span class="sec-cnt">tap to expand</span></div>
      ${BUILD.map((b,i)=>`
        <div class="note${i===0?' open':''}" id="note${i}">
          <div class="note-hdr" onclick="toggleNote(${i})">
            <span class="note-proj">${b.proj}</span>
            <span class="note-arr">▾</span>
          </div>
          <div class="note-body">
            ${b.rows.map(r=>`<div class="nrow"><span class="nk">${r.k}</span><span class="nv${r.hl?' hl':r.danger?' danger':''}">${r.v}</span></div>`).join('')}
          </div>
        </div>`).join('')}
    </div>`;
}

function toggleNote(i){
  const el=document.getElementById('note'+i);
  el.classList.toggle('open');
}

function showTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById(tab).classList.add('active');
}

function renderAll(){
  renderUrgent();
  renderStats();
  renderTasks();
  renderProjects();
  renderDocs();
  renderBuild();
}

// Date
document.getElementById('hdate').textContent=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

// Init
loadState().then(()=>renderAll());
</script>
